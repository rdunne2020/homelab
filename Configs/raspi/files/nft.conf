table inet filter {
        # obtain from https://www.cloudflare.com/ips-v4 and v6
        set cloudflare_v4 {
                type ipv4_addr
                flags interval
                elements = {
                        173.245.48.0/20,
                        103.21.244.0/22,
                        103.22.200.0/22,
                        103.31.4.0/22,
                        141.101.64.0/18,
                        108.162.192.0/18,
                        190.93.240.0/20,
                        188.114.96.0/20,
                        197.234.240.0/22,
                        198.41.128.0/17,
                        162.158.0.0/15,
                        104.16.0.0/13,
                        104.24.0.0/14,
                        172.64.0.0/13,
                        131.0.72.0/22
                }
        }
        set cloudflare_v6 {
                type ipv6_addr
                flags interval
                elements = {
                        2400:cb00::/32,
                        2606:4700::/32,
                        2803:f800::/32,
                        2405:b500::/32,
                        2405:8100::/32,
                        2a06:98c0::/29,
                        2c0f:f248::/32,
                }
        }
        chain input {
                type filter hook input priority 0; policy drop
                # --- Base Security Rules (MUST come first) ---

                # 1. Allow traffic on the loopback interface (localhost)
                iif lo accept comment "Accept loopback traffic";

                # 2. Allow established/related connections (essential for keeping sessions alive)
                ct state established,related accept comment "Allow established/related connections";
                # 3. Drop invalid packets
                ct state invalid drop comment "Drop invalid packets";

                # Allow all local traffic from LAN
                ip saddr 192.168.0.0/24 accept comment "Allow ALL LAN traffic from 192.168.0.0/24";

                # --- The Cloudflare Rule (The core logic) ---

                # 5. ACCEPT HTTP/S traffic if the source IP is IN the Cloudflare IPv4 Set
                ip saddr @cloudflare_v4 tcp dport { http, https, 22443 } accept comment "CF IPv4 Allow HTTP/S";

                # 6. ACCEPT HTTP/S traffic if the source IP is IN the Cloudflare IPv6 Set
                ip6 saddr @cloudflare_v6 tcp dport { http, https, 22443 } accept comment "CF IPv6 Allow HTTP/S";

                # --- Default Policy (The Block Rule) ---

                # 7. **ALL** other incoming traffic is dropped by the 'policy drop' defined above.
                #    This policy implicitly blocks non-Cloudflare HTTP/S traffic because it didn't match the ACCEPT rules above.
        }
}
